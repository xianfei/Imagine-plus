name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # create the GitHub release once, as a draft, so the parallel build jobs
  # can each upload their renamed assets into it without racing to create it
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$REPO" \
              --draft \
              --title "ImaginePlus $TAG" \
              --notes "See the assets below to download this version."
          fi

  publish-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macOS
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            os: macOS
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            os: Linux
            args: ''
          - platform: windows-latest
            os: Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # both mac architectures build from the same runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # rav1e's x86_64 SIMD assembly is built with NASM (needed for the
      # Linux, Windows and mac x86_64 targets)
      - uses: ilammy/setup-nasm@v1

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # build only (no tagName) so we can rename the bundles before upload;
      # exposes the built bundle paths via steps.build.outputs.artifactPaths
      - id: build
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      # rename each bundle to ImaginePlus_<OS>_<arch>… (swap the version
      # token for the OS label) and upload to the draft release. The Windows
      # portable exe — the bare binary with embedded assets — is added on
      # top, since tauri-action only reports bundler outputs.
      - name: Rename and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.build.outputs.artifactPaths }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          OS_NAME: ${{ matrix.os }}
        run: |
          set -euo pipefail
          version="${TAG#v}"

          files=()
          if [ -n "${ARTIFACT_PATHS:-}" ]; then
            while IFS= read -r p; do
              [ -n "$p" ] && files+=("$p")
            done < <(printf '%s' "$ARTIFACT_PATHS" | jq -r '.[]')
          fi

          portable=""
          if [ "$OS_NAME" = "Windows" ]; then
            portable=$(ls -S src-tauri/target/release/*.exe | head -n1)
            files+=("$portable")
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts found to upload" >&2
            exit 1
          fi

          mkdir -p dist-release
          for f in "${files[@]}"; do
            if [ -n "$portable" ] && [ "$f" = "$portable" ]; then
              newbase="ImaginePlus_${OS_NAME}_x64-portable.exe"
            else
              base="$(basename "$f")"
              newbase="${base/ImaginePlus_${version}_/ImaginePlus_${OS_NAME}_}"
            fi
            echo "  $(basename "$f")  ->  $newbase"
            cp "$f" "dist-release/$newbase"
          done

          gh release upload "$TAG" dist-release/* -R "$REPO" --clobber
